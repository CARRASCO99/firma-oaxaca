            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card-view {
            max-width: 450px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .floating-contact {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-social {

            justify-content: center;
            align-items: center;
            color: white;
